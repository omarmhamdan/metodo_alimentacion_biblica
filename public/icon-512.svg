<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B8E23"/>
      <stop offset="100%" stop-color="#D4A373"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#EFE7DD"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bowl -->
  <path d="M140 318 Q256 422 372 318 L368 296 L144 296 Z" fill="#8B5E3C" opacity="0.85"/>
  <ellipse cx="256" cy="296" rx="116" ry="14" fill="#FFFDF8" opacity="0.5"/>

  <!-- Wheat stalk -->
  <g transform="translate(190 260) rotate(-22)" fill="url(#leaf)">
    <ellipse cx="0" cy="-80" rx="9" ry="18"/>
    <ellipse cx="-13" cy="-60" rx="9" ry="18"/>
    <ellipse cx="13" cy="-60" rx="9" ry="18"/>
    <ellipse cx="-13" cy="-38" rx="9" ry="18"/>
    <ellipse cx="13" cy="-38" rx="9" ry="18"/>
    <rect x="-1.5" y="-22" width="3" height="36" fill="#FFFDF8"/>
  </g>

  <!-- Olive branch -->
  <g transform="translate(310 160)" fill="url(#leaf)">
    <path d="M0 0 Q-16 48 -22 102" stroke="#FFFDF8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="-32" cy="16" rx="13" ry="26" transform="rotate(-30 -32 16)"/>
    <ellipse cx="14" cy="26" rx="13" ry="26" transform="rotate(40 14 26)"/>
    <ellipse cx="-40" cy="58" rx="13" ry="26" transform="rotate(-50 -40 58)"/>
    <ellipse cx="8" cy="70" rx="13" ry="26" transform="rotate(60 8 70)"/>
    <circle cx="-22" cy="38" r="7" fill="#6B8E23"/>
    <circle cx="-5" cy="54" r="7" fill="#6B8E23"/>
  </g>
</svg>
